  /v3/host:
    get:
      operationId: getHosts
      parameters:
      - description: |-
          Label expressions can be used to apply more specific search parameters and can be written in standard SQL query language.<br />
          E.g. `region_id=123` or multiple filters: `region_id=123 and fleet_id=456 or host_id=46256` The provided filter query needs to be url encoded. E.g.<br />
          `region_id%3D123` or multiple filters: `region_id%3D123%20and%20fleet_id%3D456%20or%20host_id%3D46256` The total would look like:<br />
          `/host?labels=region_id%3D123%20and%20fleet_id%3D456%20or%20host_id%3D46256`<br />
          If you want to filter on a non-numeric label such as `region_name`, you have to wrap the value in double quotes: `region_name="Rotterdam"`<br />
          Warning: the `labels` query parameter is ignored when passing a `PAGE-TOKEN` and the original `labels` string will be used for that request instead.<br />
          For more information about labels check <a href="https://www.i3d.net/docs/one/odp/Platform-Elements/Application/Label/#pre-defined-labels">details</a>
        explode: true
        in: query
        name: labels
        required: false
        schema:
          type: string
        style: form
      - description: "Example header and default range: RANGED-DATA:start=0,results=25"
        explode: false
        in: header
        name: RANGED-DATA
        required: false
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:

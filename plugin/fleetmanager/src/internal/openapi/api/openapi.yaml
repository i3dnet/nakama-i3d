  /v3/applicationInstance/game/{applicationId}/empty/allocate:
    put:
      description: |-
        Fetches an empty ONLINE application instance with the given labels or filters, for the given application ID and changes its status to ALLOCATED.
        You may pass `metadata` to this request to pass information to the application instance during allocation.
        This `v3` endpoint returns various errors if allocation failed instead of an empty array to help you pinpoint why allocation may have failed
      operationId: updateApplicationInstanceGameEmptyAllocate
      parameters:
      - description: The ID of the application
        explode: false
        in: path
        name: applicationId
        required: true
        schema:
          type: string
        style: simple
      - description: |-
          Label expressions can be used to apply more specific search parameters and can be written in standard SQL query language.<br />
          E.g. `region_id=123` or multiple filters: `region_id=123 and fleet_id=456 or host_id=46256` The provided filter query needs to be url encoded.<br />
          E.g.<br />
          `region_id%3D123` or multiple filters: `region_id%3D123%20and%20fleet_id%3D456%20or%20host_id%3D46256` The total would look like:<br />
          `/applicationInstance/game/{applicationId}/empty/allocate?labels=region_id%3D123%20and%20fleet_id%3D456%20or%20host_id%3D46256`<br />
          If you want to filter on a non-numeric label such as `region_name`, you have to wrap the value in double quotes: `region_name="Rotterdam"`<br />
          More information on the use of labels can be found <a href="https://www.i3d.net/docs/one/odp/Platform-Elements/Application/Label/#pre-defined-labels">here</a>.
        explode: true
        in: query
        name: labels
        required: false
        schema:
          type: string
        style: form
      - description: |-
          Filter expression can be used to apply more specific search on most parameters in the application instance, it is written like<br />
          this E.G. `regionId=123` or multiple filters: `regionId=123 and fleetId=456`, only the `AND` statement is supported at this time. You can only search on exact matches.<br />
          Warning: filtering on the following parameters is currently not supported and will give an error:<br />
          `autoRestart`, `liveGameVersion`, `liveHostName`, `liveMap`, `liveRules`, `manuallyDeployed`, `markedForDeletion`, `numPlayers`, `numPlayersMax`,<br />
          `properties`, `ipAddress`, `labelReadOnly`, `labelPublic`, `metadata`, `pid`, `pidChangedAt`, `startedAt`, `status`, `stoppedAt`, `updatedAt`
        explode: true
        in: query
        name: filters
        required: false
        schema:
          type: string
        style: form
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MetadataCollection'
        description: |-
          Custom key/value pairs that form miscellaneous metadata to be stored alongside all game servers
          selected in this call. Metadata is merged with existing metadata in the game server. Key/value pairs are only deleted if you submit a key with a
          `null` value
        required: false
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/ApplicationInstance'
                type: array
          description: OK
        "400":
          description: An invalid filter column is provided
        "403":
          description: Invalid credentials
        "404":
          description: |-
            Invalid `applicationId`, or if any of the following `filters` contain a value that cannot be resolved to their respective entity (labels and
            nested objects not supported):
            * 1: `deploymentEnvironmentId`
            * 2: `deploymentEnvironmentName`
            * 3: `fleetId`
            * 4: `fleetName`
            * 5: `regionId`
            * 6: `regionName`
            * 7: `dcLocationId`
            * 8: `dcLocationName`<br /><br />
            If no application instances can be allocated and if your application is configured to use the Arcus protocol,
            and there is a connection problem with Arcus or Arcus is not implemented properly in your application build, a separate error may be thrown.
            Alternatively, if your `filters` contain one (or more) of the following properties but they filter out application instances that would be available for
            allocation, a `404` error can be thrown detailing which filter caused no application instances to be found:<br />
            * 1: `deploymentEnvironmentId`
            * 2: `fleetId`
            * 3: `regionId`
            * 4: `dcLocationId`
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal Server Error
        "504":
          description: The host agent could not be reached
      summary: Allocate an ONLINE application instance and return errors if there
        are no application instances to allocate
      tags:
      - ApplicationInstance

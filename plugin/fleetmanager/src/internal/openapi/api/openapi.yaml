  /v3/applicationInstance:
    get:
      operationId: getApplicationInstances
      parameters:
      - description: |-
          Label expressions can be used to apply more specific search parameters and can be written in standard SQL query language.<br />
          E.g. `region_id=123` or multiple filters: `region_id=123 and fleet_id=456 or host_id=46256` The provided filter query needs to be url encoded. E.g.<br />
          `region_id%3D123` or multiple filters: `region_id%3D123%20and%20fleet_id%3D456%20or%20host_id%3D46256` The total would look like:<br />
          `/applicationInstance?labels=region_id%3D123%20and%20fleet_id%3D456%20or%20host_id%3D46256`<br />
          If you want to filter on a non-numeric label such as `region_name`, you have to wrap the value in double quotes: `region_name="Rotterdam"`<br />
          Warning: the `labels` query parameter is ignored when passing a `PAGE-TOKEN` and the original `labels` string will be used for that request<br />
          instead. More information on the use of labels can be found in the<br />
          <a href="https://www.i3d.net/docs/one/odp/Platform-Elements/Application/Label/#pre-defined-labels">label documentation</a>.
        explode: true
        in: query
        name: labels
        required: false
        schema:
          type: string
        style: form
      - description: |-
          Filter expression can be used to apply more specific search on most parameters in the application instance, it is written like<br />
          this E.G. `regionId=123` or multiple filters: `regionId=123 and fleetId=456`, only the `AND` statement is supported at this time. You can also<br />
          search inside nested objects like `metadata.key="testing"` and `metadata.value="test"` You can only search on exact matches.<br />
          Warning: the `filters` query parameter is ignored when passing a `PAGE-TOKEN` and the original `filters` string will be used for that request<br />
          instead.<br />
          Warning: filtering on the following parameters is currently not supported and will give an error:<br />
          `autoRestart`, `liveGameVersion`, `liveHostName`, `liveMap`, `liveRules`, `manuallyDeployed`, `markedForDeletion`, `numPlayers`, `numPlayersMax`,<br />
          `pid`, `pidChangedAt`, `startedAt`, `status`, `stoppedAt`, `updatedAt`
        explode: true
        in: query
        name: filters
        required: false
        schema:
          type: string
        style: form
      - description: |-
          Sort expression to sort your results in the order that you like E.G. `sort=fleetId ASC, applicationId DESC` Be aware that all filters<br />
          and sorting should be url encoded.<br />
          Warning: the `sort` query parameter is ignored when passing a `PAGE-TOKEN` and the original `sort` string will be used for that request instead<br />
          Warning: sorting on the following parameters is currently not supported and will give an error:<br />
          `autoRestart`, `liveGameVersion`, `liveHostName`, `liveMap`, `liveRules`, `manuallyDeployed`, `markedForDeletion`, `numPlayers`, `numPlayersMax`,<br />
          `pid`, `pidChangedAt`, `startedAt`, `status`, `stoppedAt`, `updatedAt`
        explode: true
        in: query
        name: sort
        required: false
        schema:
          type: string
        style: form
      - description: |-
          Example header and default range: RANGED-DATA: <span style="text-decoration: line-through">start=0,</span>results=25<br />
          Warning: the `start` variable of the `RANGED-DATA` object has been deprecated for this endpoint. It is not possible to supply a start, see<br />
          `PAGE-TOKEN` header for a replacement
        explode: false
        in: header
        name: RANGED-DATA
        required: false
        schema:
          type: string
        style: simple
      - description: |-
          This token will be provided by this endpoint to allow for pagination functionality. By performing a request to this endpoint<br />
          without the `PAGE-TOKEN` you will retrieve the first page of search results. If a `PAGE-TOKEN` is returned, a next page may be requested by<br />
          supplying that token in the next request using the same `PAGE-TOKEN` key and value in the request header. If no `PAGE-TOKEN` is returned, the last<br />
          page has been reached and no further data can be requested. A returned `PAGE-TOKEN` is valid until the date specified in the `Expires` response<br />
          header. Example: `PAGE-TOKEN: eyJjb25kaXRpb25zIjp7InVzZXJJZCI6NjY2ODI1fSwibGFiZWxz(...)` (truncated for readability)<br />
          Expires header example: `Expires: Fri, 08 Jan 2021 09:10:29 GMT`
        explode: false
        in: header
        name: PAGE-TOKEN
        required: false
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/ApplicationInstance'
                type: array
          description: OK
        "400":
          description: |-
            1. `PAGE-TOKEN` did not have an expected structure and is invalid. Please try again by sending a request without a `PAGE-TOKEN` and restarting.
            2. An invalid filter or sort column is provided
        "403":
          description: Invalid credentials
        "410":
          description: '`PAGE-TOKEN` is expired. Acquire a new `PAGE-TOKEN` by sending
            a request without a `PAGE-TOKEN` and try again'
        "422":
          description: Labels error
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal Server Error
      summary: Get all your application instances and their main details
      tags:
      - ApplicationInstance

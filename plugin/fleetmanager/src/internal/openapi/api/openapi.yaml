paths:
  /v3/deploymentEnvironment:
    get:
      operationId: getDeploymentEnvironments
      parameters:
      - description: "Example header and default range: RANGED-DATA:start=0,results=25"
        explode: false
        in: header
        name: RANGED-DATA
        required: false
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/DeploymentEnvironment'
                type: array
          description: OK
        "403":
          description: Invalid credentials
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal Server Error
      summary: Get the details of all your deployment environment
      tags:
      - DeploymentEnvironment
    post:
      operationId: createDeploymentEnvironment
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeploymentEnvironment'
        description: ""
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/DeploymentEnvironment'
                type: array
          description: OK
        "403":
          description: Invalid credentials
        "422":
          description: Unprocessable Entity
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal Server Error
      summary: Create a deployment environment
      tags:
      - DeploymentEnvironment
  /v3/deploymentEnvironment/{deploymentEnvironmentId}:
    delete:
      operationId: deleteDeploymentEnvironment
      parameters:
      - description: The Id of the deployment environment
        explode: false
        in: path
        name: deploymentEnvironmentId
        required: true
        schema:
          type: string
        style: simple
      responses:
        "204":
          description: No Content
        "403":
          description: Invalid credentials
        "404":
          description: Invalid deploymentEnvironmentId
        "409":
          description: Cannot delete
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal Server Error
      summary: Delete given deployment environment
      tags:
      - DeploymentEnvironment
    get:
      operationId: getDeploymentEnvironment
      parameters:
      - description: The Id of the deployment environment
        explode: false
        in: path
        name: deploymentEnvironmentId
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/DeploymentEnvironment'
                type: array
          description: OK
        "403":
          description: Invalid credentials
        "404":
          description: Invalid deploymentEnvironmentId
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal Server Error
      summary: Get the details of the given deployment environment
      tags:
      - DeploymentEnvironment
    put:
      operationId: updateDeploymentEnvironment
      parameters:
      - description: The Id of the deployment environment
        explode: false
        in: path
        name: deploymentEnvironmentId
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeploymentEnvironment'
        description: ""
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/DeploymentEnvironment'
                type: array
          description: OK
        "403":
          description: Invalid credentials
        "404":
          description: Invalid deploymentEnvironmentId
        "422":
          description: Unprocessable Entity
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal Server Error
      summary: Update given deployment environment
      tags:
      - DeploymentEnvironment
  /v3/deploymentEnvironment/{deploymentEnvironmentId}/fleet:
    get:
      operationId: getDeploymentEnvironmentFleets
      parameters:
      - description: The Id of the deployment environment
        explode: false
        in: path
        name: deploymentEnvironmentId
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/Fleet'
                type: array
          description: OK
        "403":
          description: Invalid credentials
        "404":
          description: Invalid deploymentEnvironmentId
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal Server Error
      summary: Get all the active fleets that belong to the given deployment environment.
      tags:
      - DeploymentEnvironment
  /v3/deploymentEnvironment/{deploymentEnvironmentId}/host:
    get:
      operationId: getDeploymentEnvironmentHosts
      parameters:
      - description: The Id of the deployment environment
        explode: false
        in: path
        name: deploymentEnvironmentId
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/Host'
                type: array
          description: OK
        "403":
          description: Invalid credentials
        "404":
          description: Invalid deploymentEnvironmentId
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal Server Error
      summary: Get all your hosts for given deployment environment
      tags:
      - DeploymentEnvironment
  /v3/deploymentEnvironment/{deploymentEnvironmentId}/application/inUse:
    get:
      operationId: getDeploymentEnvironmentApplicationInUses
      parameters:
      - description: The Id of the deployment environment
        explode: false
        in: path
        name: deploymentEnvironmentId
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/Application'
                type: array
          description: OK
        "403":
          description: Invalid credentials
        "404":
          description: Invalid deploymentEnvironmentId
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal Server Error
      summary: Get the list of in use applications for given deployment environment
        Id
      tags:
      - DeploymentEnvironment
  /v3/deploymentEnvironment/{deploymentEnvironmentId}/application/{applicationId}/fleet:
    get:
      operationId: getDeploymentEnvironmentApplicationFleets
      parameters:
      - description: The Id of the deployment environment
        explode: false
        in: path
        name: deploymentEnvironmentId
        required: true
        schema:
          type: string
        style: simple
      - description: The Id of the application
        explode: false
        in: path
        name: applicationId
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/Fleet'
                type: array
          description: OK
        "403":
          description: Invalid credentials
        "404":
          description: Invalid deploymentEnvironmentId or applicationId
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal Server Error
      summary: "Get the list of fleet in a deployment environment, having a certain\
        \ application of type game"
      tags:
      - DeploymentEnvironment
  /v3/deploymentEnvironment/{deploymentEnvironmentId}/applicationBuild/inUse:
    get:
      operationId: getDeploymentEnvironmentApplicationBuildInUses
      parameters:
      - description: The Id of the deployment environment
        explode: false
        in: path
        name: deploymentEnvironmentId
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/ApplicationBuild'
                type: array
          description: OK
        "403":
          description: Invalid credentials
        "404":
          description: Invalid deploymentEnvironmentId
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal Server Error
      summary: Get the list of in use application builds for a given deployment environment
        Id
      tags:
      - DeploymentEnvironment
  /v3/deploymentEnvironment/{deploymentEnvironmentId}/deploymentProfile:
    get:
      operationId: getDeploymentEnvironmentDeploymentProfiles
      parameters:
      - description: The Id of the deployment environment
        explode: false
        in: path
        name: deploymentEnvironmentId
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/DeploymentProfile'
                type: array
          description: OK
        "403":
          description: Invalid credentials
        "404":
          description: Invalid deploymentEnvironmentId
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal Server Error
      summary: Get all the cloud deployment profiles you have created
      tags:
      - DeploymentEnvironment
  /v3/deploymentEnvironment/{deploymentEnvironmentId}/applicationInstance:
    get:
      description: "Note: bare metal servers and VMs are exposed in the same manner,\
        \ as \"dedicated servers\". hostId can be found in the /host endpoint."
      operationId: getDeploymentEnvironmentApplicationInstances
      parameters:
      - description: The Id of the deployment environment
        explode: false
        in: path
        name: deploymentEnvironmentId
        required: true
        schema:
          type: string
        style: simple
      - description: |-
          Label expressions can be used to apply more specific search parameters and can be written in standard SQL query language.<br />
          E.g. `region_id=123` or multiple filters: `region_id=123 and fleet_id=456 or host_id=46256` The provided filter query needs to be url encoded. E.g.<br />
          `region_id%3D123` or multiple filters: `region_id%3D123%20and%20fleet_id%3D456%20or%20host_id%3D46256` The total would look like:<br />
          `/deploymentEnvironment/{deploymentEnvironmentId}/applicationInstance?labels=region_id%3D123%20and%20fleet_id%3D456%20or%20host_id%3D46256`<br />
          If you want to filter on a non-numeric label such as `region_name`, you have to wrap the value in double quotes: `region_name="Rotterdam"`<br />
          Warning: the `labels` query parameter is ignored when passing a `PAGE-TOKEN` and the original `labels` string will be used for that request instead.<br />
          More information on the use of labels can be found <a href="https://www.i3d.net/docs/one/odp/Platform-Elements/Application/Label/#pre-defined-labels">here</a>.
        explode: true
        in: query
        name: labels
        required: false
        schema:
          type: string
        style: form
      - description: |-
          Filter expression can be used to apply more specific search on most parameters in the application instance, it is written like<br />
          this E.G. `regionId=123` or multiple filters: `regionId=123 and fleetId=456`, only the `AND` statement is supported at this time. You can also<br />
          search inside nested objects like `metaData.key="testing"` and `metaData.value="test"` You can only search on exact matches.<br />
          Warning: the `filters` query parameter is ignored when passing a `PAGE-TOKEN` and the original `filters` string will be used for that request<br />
          instead.<br />
          Warning: filtering on the following parameters is currently not supported and will give an error:<br />
          `autoRestart`, `liveGameVersion`, `liveHostName`, `liveMap`, `liveRules`, `manuallyDeployed`, `markedForDeletion`, `numPlayers`, `numPlayersMax`,<br />
          `pid`, `pidChangedAt`, `startedAt`, `status`, `stoppedAt`, `updatedAt`
        explode: true
        in: query
        name: filters
        required: false
        schema:
          type: string
        style: form
      - description: |-
          Sort expression to sort your results in the order that you like E.G. "sort=fleetId=ASC and applicationId DESC" Be aware that all filters<br />
          and sorting should be url encoded.<br />
          Warning: the `sort` query parameter is ignored when passing a `PAGE-TOKEN` and the original `sort` string will be used for that request instead<br />
          Warning: sorting on the following parameters is currently not supported and will give an error:<br />
          `autoRestart`, `liveGameVersion`, `liveHostName`, `liveMap`, `liveRules`, `manuallyDeployed`, `markedForDeletion`, `numPlayers`, `numPlayersMax`,<br />
          `pid`, `pidChangedAt`, `startedAt`, `status`, `stoppedAt`, `updatedAt`
        explode: true
        in: query
        name: sort
        required: false
        schema:
          type: string
        style: form
      - description: |-
          Example header and default range: RANGED-DATA: <span style="text-decoration: line-through">start=0,</span>results=25<br />
          Warning: the `start` variable of the `RANGED-DATA` object has been deprecated for this endpoint. It is not possible to supply a start, see<br />
          `PAGE-TOKEN` header for a replacement
        explode: false
        in: header
        name: RANGED-DATA
        required: false
        schema:
          type: string
        style: simple
      - description: |-
          This token will be provided by this endpoint to allow for pagination functionality. By performing a request to this endpoint<br />
          without the `PAGE-TOKEN` you will retrieve the first page of search results. If a `PAGE-TOKEN` is returned, a next page may be requested by<br />
          supplying that token in the next request using the same `PAGE-TOKEN` key and value in the request header. If no `PAGE-TOKEN` is returned, the last<br />
          page has been reached and no further data can be requested. A returned `PAGE-TOKEN` is valid until the date specified in the `Expires` response<br />
          header. Example: `PAGE-TOKEN: eyJjb25kaXRpb25zIjp7InVzZXJJZCI6NjY2ODI1fSwibGFiZWxz(...)` (truncated for readability)<br />
          Expires header example: `Expires: Fri, 08 Jan 2021 09:10:29 GMT`
        explode: false
        in: header
        name: PAGE-TOKEN
        required: false
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/ApplicationInstance'
                type: array
          description: OK
        "400":
          description: '`PAGE-TOKEN` did not have an expected structure and is invalid.
            Please try again by sending a request without a `PAGE-TOKEN` and restarting'
        "403":
          description: Invalid credentials
        "404":
          description: Invalid deploymentEnvironmentId
        "410":
          description: '`PAGE-TOKEN` is expired. Acquire a new `PAGE-TOKEN` by sending
            a request without a `PAGE-TOKEN` and try again'
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal Server Error
      summary: Get all the application instances for the given deployment environment
      tags:
      - DeploymentEnvironment
  /v3/telemetry/deploymentEnvironment/{deploymentEnvironmentId}/current:
    get:
      operationId: getTelemetryDeploymentEnvironmentCurrents
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/DeploymentEnvironmentTelemetryModel'
                type: array
          description: OK
        "403":
          description: Invalid credentials
        "404":
          description: Invalid deploymentEnvironmentId
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal Server Error
      summary: Get current deployment environment telemetry
      tags:
      - DeploymentEnvironmentTelemetry
  /v3/fleet:
    get:
      operationId: getFleets
      parameters:
      - description: "Example header and default range: RANGED-DATA:start=0,results=25"
        explode: false
        in: header
        name: RANGED-DATA
        required: false
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/Fleet'
                type: array
          description: OK
        "403":
          description: Invalid credentials
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal Server Error
      summary: Get a list of fleets
      tags:
      - Fleet
    post:
      operationId: createFleet
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Fleet'
        description: ""
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/Fleet'
                type: array
          description: OK
        "403":
          description: Invalid credentials
        "422":
          description: Unprocessable Entity
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal Server Error
      summary: Create a new fleet
      tags:
      - Fleet
  /v3/fleet/{fleetId}:
    delete:
      operationId: deleteFleet
      parameters:
      - description: The ID of the fleet
        explode: false
        in: path
        name: fleetId
        required: true
        schema:
          type: string
        style: simple
      responses:
        "204":
          description: No Content
        "403":
          description: Invalid credentials
        "404":
          description: Invalid fleetId
        "409":
          description: "Fleet in use, cannot delete"
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal Server Error
      summary: Removes an existing fleet. Note that it may not have any active servers
        assigned to it.
      tags:
      - Fleet
    get:
      operationId: getFleet
      parameters:
      - description: The Id of the fleet
        explode: false
        in: path
        name: fleetId
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/Fleet'
                type: array
          description: OK
        "403":
          description: Invalid credentials
        "404":
          description: Invalid fleetId
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal Server Error
      summary: Get a specific fleet by Id
      tags:
      - Fleet
    put:
      operationId: updateFleet
      parameters:
      - description: The Id of the fleet
        explode: false
        in: path
        name: fleetId
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Fleet'
        description: ""
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/Fleet'
                type: array
          description: OK
        "403":
          description: Invalid credentials
        "404":
          description: Invalid fleetId
        "422":
          description: Unprocessable Entity
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal Server Error
      summary: Update given fleet
      tags:
      - Fleet
  /v3/fleet/{fleetId}/operationalStatus:
    put:
      operationId: updateFleetOperationalStatus
      parameters:
      - description: The Id of the fleet
        explode: false
        in: path
        name: fleetId
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OperationalStatus'
        description: |-
          Options:
          - 0: Manual, no application instances will be deployed nor deleted
          - 1: Automatic deployment enabled, the initial deploy according to deploymentProfile will be activated
          - 2: Automatic scaling enabled, scaling based on demand will be activated
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/Fleet'
                type: array
          description: OK
        "403":
          description: Invalid credentials
        "404":
          description: Invalid fleetId
        "422":
          description: Unprocessable Entity
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal Server Error
      summary: Update the operational status of the given fleet
      tags:
      - Fleet
  /v3/fleet/{fleetId}/host/reserved:
    get:
      operationId: getFleetHostReserveds
      parameters:
      - description: The Id of the fleet
        explode: false
        in: path
        name: fleetId
        required: true
        schema:
          type: string
        style: simple
      - description: "Example header and default range: RANGED-DATA:start=0,results=25"
        explode: false
        in: header
        name: RANGED-DATA
        required: false
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/Host'
                type: array
          description: OK
        "403":
          description: Invalid credentials
        "404":
          description: Invalid fleetId
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal Server Error
      summary: Get all hosts reserved for the given fleet
      tags:
      - Fleet
  /v3/fleet/host/bulkReserve:
    post:
      operationId: createFleetHostBulkReserve
      parameters:
      - description: |-
          Response header which you can use to fetch the status of the bulk reservation of hosts by using endpoint<br />
          [`GET /v3/fleet/host/bulkReserve/{traceId}/status`](#/Fleet/getFleetHostBulkReserveStatuses)
        explode: false
        in: header
        name: 'X-Trace-Id:'
        required: false
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkReserveHostByFleet'
        description: ""
        required: true
      responses:
        "204":
          description: No Content
        "403":
          description: Invalid credentials
        "422":
          description: Unprocessable Entity
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal Server Error
      summary: Reserve a list of hosts for a specific new fleet. The existing application
        instances on these servers will be automatically scaled down.
      tags:
      - Fleet

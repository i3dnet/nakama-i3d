components:
  schemas:
    Application:
      additionalProperties: false
      example:
        stopMethod: 5
        stopTimeout: 5
        description: description
        type: 0
        createdAt: 2
        websiteUrl: websiteUrl
        stopDefaultOsGroup: 1
        publisherName: publisherName
        managementProtocol: 6
        name: name
        inUse: 7
        id: id
        developerName: developerName
      properties:
        id:
          description: Application ID
          format: ""
          readOnly: true
          type: string
        type:
          description: "The list of application type can be found in: GET /application/type"
          format: integer
          type: integer
        managementProtocol:
          description: |-
            The protocol used to manage the application (defaults to None when not set):
            * 0: None
            * 1: A2S
            * 2: ARCUS
          format: integer
          type: integer
        name:
          description: The public name of your application
          format: ""
          type: string
        websiteUrl:
          description: The url to your application's website
          format: ""
          type: string
        description:
          description: A short description of your application
          format: ""
          type: string
        developerName:
          description: The name of the application's developer
          format: ""
          type: string
        publisherName:
          description: The name of the application's publisher
          format: ""
          type: string
        stopDefaultOsGroup:
          description: |-
            The default operating system group being used for the stop method. If you have a Windows and Linux ApplicationBuild you can overwrite this on the ApplicationBuild level. Must be one of:
            * 1: Windows
            * 2: Linux (default)
          format: integer
          type: integer
        stopMethod:
          description: "The stop method that will be used on restart or destroy of\
            \ an application instance. The default is hard kill, list of types can\
            \ be found in: [GET /v3/application/stopMethod](game-publisher#/Application/getApplicationStopMethods)"
          format: integer
          type: integer
        stopTimeout:
          description: "The timeout that will be used on restart or destroy of an\
            \ application instance, in seconds. The default is 0 (no timeout)"
          format: integer
          type: integer
        createdAt:
          description: UnixTimestamp
          format: integer
          readOnly: true
          type: integer
        inUse:
          description: If the application currently in use or not
          format: integer
          readOnly: true
          type: integer
      required:
      - createdAt
      - id
      - inUse
      - managementProtocol
      - name
      - type
      type: object
    ApplicationBuild:
      additionalProperties: false
      example:
        buildProvisioningStorageType: 9
        hostCapacityTemplateId: hostCapacityTemplateId
        stopMethod: 5
        stopTimeout: 2
        instanceDoesReadyCallback: 6
        runAsRoot: 3
        osId: 5
        label:
        - value: value
          key: key
        - value: value
          key: key
        type: 0
        installId: 1
        executable: executable
        createdAt: 7
        startupParameters: startupParameters
        applicationBuildFile: ""
        name: name
        id: id
        applicationId: applicationId
      properties:
        id:
          description: Application build ID
          format: ""
          readOnly: true
          type: string
        name:
          description: The name of the application build
          format: ""
          type: string
        applicationId:
          description: The ID of the application. May be null if buildProvisioningStorageType
            is LegacyFTP
          format: ""
          nullable: true
          type: string
        hostCapacityTemplateId:
          description: The ID of the host capacity template
          format: ""
          type: string
        type:
          description: "The application build, list of types can be found in: [GET\
            \ /application/type](#/Application/get_v3_application_type)"
          format: integer
          readOnly: true
          type: integer
        executable:
          description: The executable name including the path originating from the
            root directory of the software structure
          format: ""
          type: string
        startupParameters:
          description: The startup parameters required for an executable
          format: ""
          type: string
        instanceDoesReadyCallback:
          description: |-
            Set to 1 if a deployed application instance will inform the platform it's done with initializing and is ready to
            accept players. Defaults to 0 if not set, which means an instance's status will go directly to ONLINE (4) after starting
          format: integer
          type: integer
        installId:

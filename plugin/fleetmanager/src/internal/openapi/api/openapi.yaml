  /v3/deploymentProfile/{deploymentProfileId}:
    delete:
      description: |-
        A task will be created and returned (response 200) if the deployment profile is in use, the deployment profile will be mark for deletion and after all the application instances are deleted the deployment profile will be deleted.
        If not in use, then the deployment profile will be immediately deleted and no content will be returned (status 204)
      operationId: deleteDeploymentProfile
      parameters:
      - description: "Id for the method of deletion: hard-kill = 1, graceful=2"
        explode: true
        in: query
        name: methodId
        required: false
        schema:
          type: integer
        style: form
      - description: Unix timestamp. When to start deleting the containerLocation
          and its contents. Default = now
        explode: true
        in: query
        name: startTime
        required: false
        schema:
          type: integer
        style: form
      - description: Unix timestamp. Time limit in which to delete all remaining game
          servers immediately (not graceful). Default = 0 (no limit)
        explode: true
        in: query
        name: endTime
        required: false
        schema:
          type: integer
        style: form
      - description: Id of the deployment profile to delete
        explode: false
        in: path
        name: deploymentProfileId
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/TaskStatus'
                type: array
          description: OK
        "204":
          description: No Content
        "403":
          description: Invalid credentials
        "404":
          description: Invalid deploymentProfileId
        "409":
          description: Unable to delete due to deployment profile being in-use
        "422":
          description: Invalid startTime and/or endTime
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal Server Error
      summary: Delete given deployment profile (it will delete all the application
        instances if there are any)
      tags:
      - DeploymentProfile
    get:
      operationId: getDeploymentProfile
      parameters:
      - description: The Id of the deployment profile
        explode: false
        in: path
        name: deploymentProfileId
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/DeploymentProfile'
                type: array
          description: OK
        "403":
          description: Invalid credentials
        "404":
          description: Invalid deploymentProfileId
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal Server Error
      summary: Get the given deployment profile
      tags:
      - DeploymentProfile
    put:
      operationId: updateDeploymentProfile
      parameters:
      - description: The Id of the deployment profile
        explode: false
        in: path
        name: deploymentProfileId
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeploymentProfile'
        description: ""
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/DeploymentProfile'
